name: onboard-candidate

on:
  workflow_dispatch:
    inputs:
      candidate:
        description: GitHub username of the candidate
        required: true
        type: string
      email:
        description: Candidate email captured via the private intake path
        required: false
        default: ""
        type: string

permissions:
  issues: write
  contents: read

concurrency:
  group: onboard-candidate-${{ inputs.candidate }}
  cancel-in-progress: false

jobs:
  onboard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate inputs
        env:
          CANDIDATE: ${{ inputs.candidate }}
        run: |
          set -euo pipefail
          if [ -z "$CANDIDATE" ]; then
            echo "candidate input is required" >&2
            exit 1
          fi
          if ! [[ "$CANDIDATE" =~ ^[A-Za-z0-9-]+$ ]]; then
            echo "candidate must be a valid GitHub username slug" >&2
            exit 1
          fi

      - name: Check idempotency + create repo
        id: onboard
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          CANDIDATE: ${{ inputs.candidate }}
          EMAIL: ${{ inputs.email }}
        run: |
          set -euo pipefail

          retry() {
            local attempt=1
            local max_attempts=3
            local delay=2
            while true; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi
              attempt=$((attempt + 1))
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          gh_api() {
            retry gh api "$@"
          }

          CANDIDATE_REPO="kilicasa-recruiting/${CANDIDATE}"
          ADMIN_PATH="candidates/${CANDIDATE}.json"
          EXISTS=false

          # Idempotency check: does the candidate already have a repo?
          if gh repo view "$CANDIDATE_REPO" >/dev/null 2>&1; then
            EXISTS=true
          else
            retry gh repo create "$CANDIDATE_REPO" \
              --template "kilicasa-recruiting/recruiting-template" \
              --private
          fi

          # Forking is already disabled at ORG level (org policy "Disable forking
          # of private and internal repositories"). Attempting to PATCH allow_forking=false
          # on the repo returns 422 because the field is enforced upstream.
          # Org-level enforcement is stronger than per-repo (tamper-proof), so we rely on it.

          # Create the `submitted` label on the candidate repo.
          # The template's .github/labels.yml + init-labels workflow do NOT auto-fire
          # on template instantiation (no `push` event), so we provision it here.
          gh api -X POST "repos/${CANDIDATE_REPO}/labels" \
            -f name=submitted \
            -f color=e4841a \
            -f description="Candidat a soumis sa PR / Candidate has submitted their PR" \
            || echo "[warn] label 'submitted' creation failed (may already exist), continuing"

          # Invite candidate as collaborator with push (safe to re-run).
          gh_api -X PUT "repos/${CANDIDATE_REPO}/collaborators/${CANDIDATE}" -f permission=push

          # Compute deadline (7 days from now)
          INVITED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DEADLINE_AT=$(date -u -d "+7 days" +"%Y-%m-%dT%H:%M:%SZ")

          # Upsert candidates/<handle>.json in recruiting-admin via Contents API.
          CANDIDATE_JSON=$(jq -cn \
            --arg handle "$CANDIDATE" \
            --arg email "$EMAIL" \
            --arg gh "$CANDIDATE" \
            --arg repo "$CANDIDATE_REPO" \
            --arg invited "$INVITED_AT" \
            --arg deadline "$DEADLINE_AT" \
            '{handle:$handle, email:$email, github_username:$gh, repo:$repo, invited_at:$invited, deadline_at:$deadline, status:"open", eval_attempts:0, last_evaluated_commit_sha:null, notes:""}')

          if ADMIN_FILE=$(gh api "repos/kilicasa-recruiting/recruiting-admin/contents/${ADMIN_PATH}" 2>/dev/null); then
            ADMIN_SHA=$(printf '%s' "$ADMIN_FILE" | jq -r '.sha')
            EXISTING_CONTENT=$(printf '%s' "$ADMIN_FILE" | jq -r '.content' | tr -d '\n' | base64 -d)
            UPDATED_JSON=$(printf '%s' "$EXISTING_CONTENT" | jq -c \
              --arg email "$EMAIL" \
              --arg repo "$CANDIDATE_REPO" \
              --arg gh "$CANDIDATE" \
              '
              .repo = $repo
              | .github_username = $gh
              | if ($email | length) > 0 and ((.email // "") | length) == 0 then
                  .email = $email
                else
                  .
                end
              ')
            if [ "$UPDATED_JSON" != "$(printf '%s' "$EXISTING_CONTENT" | jq -c '.')" ]; then
              ENCODED=$(printf '%s' "$UPDATED_JSON" | base64 -w 0)
              gh_api -X PUT "repos/kilicasa-recruiting/recruiting-admin/contents/${ADMIN_PATH}" \
                -f message="onboard: sync ${CANDIDATE} (private intake)" \
                -f content="$ENCODED" \
                -f sha="$ADMIN_SHA"
            fi
          else
            ENCODED=$(printf '%s' "$CANDIDATE_JSON" | base64 -w 0)
            gh_api -X PUT "repos/kilicasa-recruiting/recruiting-admin/contents/${ADMIN_PATH}" \
              -f message="onboard: ${CANDIDATE} (private intake)" \
              -f content="$ENCODED"
          fi

          echo "exists=${EXISTS}" >> "$GITHUB_OUTPUT"
          echo "repo_url=https://github.com/${CANDIDATE_REPO}" >> "$GITHUB_OUTPUT"
          echo "candidate_repo=${CANDIDATE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Write run summary
        if: success()
        env:
          REPO_URL: ${{ steps.onboard.outputs.repo_url }}
          EXISTS: ${{ steps.onboard.outputs.exists }}
        run: |
          if [ "$EXISTS" = "true" ]; then
            {
              echo "## Candidate already had a repo"
              echo
              echo "- Repo: ${REPO_URL}"
              echo "- The collaborator invitation was refreshed."
              echo "- The recruiting-admin record was synchronized if needed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Candidate repo created"
              echo
              echo "- Repo: ${REPO_URL}"
              echo "- The collaborator invitation was sent."
              echo "- The recruiting-admin record was created or synchronized."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write failure summary
        if: failure()
        run: |
          {
            echo "## Onboarding failed"
            echo
            echo "Review the failed step logs before retrying this workflow."
            echo "No candidate-facing public issue was used in this flow."
          } >> "$GITHUB_STEP_SUMMARY"
